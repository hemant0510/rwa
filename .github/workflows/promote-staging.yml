# ─────────────────────────────────────────────────────────
# Promote to Staging — Manual trigger
# Re-tags the dev image and deploys to staging environment
# ─────────────────────────────────────────────────────────
name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Git SHA of the dev image to promote (leave blank for latest dev)"
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: rwa-app
  RESOURCE_GROUP: ${{ vars.STAGING_RESOURCE_GROUP }}  # e.g. rwa-staging
  APP_NAME: ${{ vars.STAGING_APP_NAME }}              # e.g. rwa-app-staging

jobs:
  promote:
    name: Promote Dev → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Determine source image
        id: source
        run: |
          if [ -n "${{ inputs.image_sha }}" ]; then
            SHA="${{ inputs.image_sha }}"
          else
            # Use the latest dev image
            SHA=$(az acr repository show-tags \
              --name ${{ env.ACR_NAME }} \
              --repository ${{ env.IMAGE_NAME }} \
              --orderby time_desc \
              --query "[?starts_with(@, 'dev-')] | [0]" -o tsv | sed 's/dev-//')
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Source image: dev-$SHA"

      - name: Re-tag image for staging
        run: |
          SOURCE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:dev-${{ steps.source.outputs.sha }}"
          STAGING_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:staging-${{ steps.source.outputs.sha }}"
          STAGING_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:staging-latest"

          docker pull "$SOURCE"
          docker tag "$SOURCE" "$STAGING_TAG"
          docker tag "$SOURCE" "$STAGING_LATEST"
          docker push "$STAGING_TAG"
          docker push "$STAGING_LATEST"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:staging-${{ steps.source.outputs.sha }}"

      - name: Run database migrations
        run: |
          az containerapp exec \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --command "npx prisma migrate deploy --schema supabase/schema.prisma" \
          || echo "::warning::Migration exec failed — run manually if needed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "✅ Staging deployed at: https://$FQDN"
          echo "### 🧪 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted from:** \`dev-${{ steps.source.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
