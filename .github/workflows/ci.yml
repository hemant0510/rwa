# ─────────────────────────────────────────────────────────
# CI — Runs on every pull request and push to develop
# Lint, type-check, test, and build validation
# ─────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema supabase/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test
