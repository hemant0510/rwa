# ─────────────────────────────────────────────────────────
# Promote to Production — Manual trigger with approval gate
# Re-tags the staging image and deploys to production
#
# IMPORTANT: Configure "production" environment in GitHub with:
#   Settings → Environments → production → Required reviewers
# ─────────────────────────────────────────────────────────
name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Git SHA of the staging image to promote (leave blank for latest staging)"
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: rwa-app
  RESOURCE_GROUP: ${{ vars.PROD_RESOURCE_GROUP }}  # e.g. rwa-prod
  APP_NAME: ${{ vars.PROD_APP_NAME }}              # e.g. rwa-app-prod

jobs:
  # ── Gate: requires manual approval via GitHub Environment ──
  approve:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deployment approved"

  promote:
    name: Promote Staging → Production
    runs-on: ubuntu-latest
    needs: approve
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Determine source image
        id: source
        run: |
          if [ -n "${{ inputs.image_sha }}" ]; then
            SHA="${{ inputs.image_sha }}"
          else
            SHA=$(az acr repository show-tags \
              --name ${{ env.ACR_NAME }} \
              --repository ${{ env.IMAGE_NAME }} \
              --orderby time_desc \
              --query "[?starts_with(@, 'staging-')] | [0]" -o tsv | sed 's/staging-//')
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Source image: staging-$SHA"

      - name: Re-tag image for production
        run: |
          SOURCE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:staging-${{ steps.source.outputs.sha }}"
          PROD_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:prod-${{ steps.source.outputs.sha }}"
          PROD_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:prod-latest"

          docker pull "$SOURCE"
          docker tag "$SOURCE" "$PROD_TAG"
          docker tag "$SOURCE" "$PROD_LATEST"
          docker push "$PROD_TAG"
          docker push "$PROD_LATEST"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:prod-${{ steps.source.outputs.sha }}"

      - name: Run database migrations
        run: |
          az containerapp exec \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --command "npx prisma migrate deploy --schema supabase/schema.prisma" \
          || echo "::warning::Migration exec failed — run manually if needed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "✅ Production deployed at: https://$FQDN"
          echo "### 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted from:** \`staging-${{ steps.source.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
